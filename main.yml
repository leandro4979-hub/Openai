name: Nexus-Omni-V2 Production Run

on:
  workflow_dispatch:
    inputs:
      user_prompt:
        description: 'Image Prompt'
        required: true
        default: 'Cyberpunk street, neon rain, high detail'
      consistency_id:
        description: 'Subject ID'
        required: false
        default: 'nexus-v2'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Run Engine
        id: omni_run
        uses: ./
        with:
          fal_key: ${{ secrets.FAL_KEY }}
          prompt: ${{ github.event.inputs.user_prompt }}
          subject_id: ${{ github.event.inputs.consistency_id }}

      - name: 🖼️ Render Gallery
        run: |
          echo "## 🚀 Nexus-Omni-V2 Result" >> $GITHUB_STEP_SUMMARY
          echo "![Generated Image](${{ steps.omni_run.outputs.image_url }})" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Download Full Resolution](${{ steps.omni_run.outputs.image_url }})" >> $GITHUB_STEP_SUMMARY
