<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdBlock AI Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border: 2px solid #0ff; box-shadow: inset 0 0 10px #0ff; margin: 10px; }
        #input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #0ff; color: #0ff; padding: 10px; outline: none; }
        button { background: #0ff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .glitch { text-shadow: 2px 0 #f0f, -2px 0 #0ff; animation: scan 2s infinite; }
        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h2 class="glitch" style="text-align:center;">⚡ ADBLOCK AI HUB ⚡</h2>
    <div id="chat">Welcome, Leandro. System ready...</div>
    <div id="input-area">
        <input type="text" id="prompt" placeholder="Request script or filter...">
        <button onclick="send()">RUN</button>
    </div>
    <script>
        // Logic to grab the pre-filled prompt from the Gemini Bridge
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('prompt')) {
            document.getElementById('prompt').value = urlParams.get('prompt');
        }
        async function send() {
            const p = document.getElementById('prompt').value;
            document.getElementById('chat').innerHTML += `<p>> ${p}</p>`;
            // This will call your Vercel Proxy
            const res = await fetch('/api/openai/v1/chat/completions', {
                method: 'POST',
                body: JSON.stringify({ model: "gpt-5.2", messages: [{role: "user", content: p}] })
            });
            const data = await res.json();
            document.getElementById('chat').innerHTML += `<p style="color:#f0f">${data.choices[0].message.content}</p>`;
        }
    </script>
</body>
</html>
// Add this inside your 'send' function after the AI responds
document.querySelectorAll('pre, code').forEach(block => {
    block.onclick = () => {
        navigator.clipboard.writeText(block.innerText);
        alert('Code Copied to Clipboard!');
    };
